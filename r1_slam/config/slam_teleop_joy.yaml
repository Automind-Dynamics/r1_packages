teleop_twist_joy_node:
  ros__parameters:

    axis_linear:
      x: 1
    scale_linear:
      x: 0.4
    scale_linear_turbo:
      x: 0.6

    axis_angular:
      yaw: 0
    scale_angular:
      yaw: 0.8
    scale_angular_turbo:
      yaw: 1.2

    enable_button: 1
    enable_turbo_button: 0
    require_enable_button: true


joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.15
    autorepeat_rate: 20.0
    coalesce_interval_ms: 1

